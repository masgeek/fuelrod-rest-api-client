name: Auto Approve PR

on:
  workflow_run:
    workflows: ["UnitTests"]
    types: [completed]

jobs:
  approve:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'pull_request' || github.event.workflow_run.event == 'push') &&
      (github.event.workflow_run.head_branch == 'main' ||github.event.workflow_run.head_branch == 'develop')

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Find PR number
        id: find-pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const run = context.payload.workflow_run;
            let prNumber = run.pull_requests?.[0]?.number;

            if (!prNumber) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${run.head_repository.owner.login}:${run.head_branch}`
              });
              prNumber = prs.find(p => p.head.sha === run.head_sha)?.number;
            }

            if (!prNumber) {
              core.setFailed(`No open PR found for SHA ${run.head_sha}`);
              return;
            }

            core.setOutput('pr_number', prNumber);

      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          pull-request-number: ${{ steps.find-pr.outputs.pr_number }}
          review-message: "✅ Auto approved after successful Lint and Unit Tests."
