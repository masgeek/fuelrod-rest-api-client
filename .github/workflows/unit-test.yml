name: UnitTests

on:
  push:
  pull_request:
    branches: [ main,develop ]
  workflow_dispatch:

jobs:
  unit-test:
    name: PHP ${{ matrix.php }} – ${{ matrix.dependency-version }}
    runs-on: ubuntu-24.04

    concurrency:
      group: unit-test-${{ github.ref }}-${{ matrix.php }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.4'
        dependency-version:
          - prefer-stable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-php${{ matrix.php }}-${{ matrix.dependency-version }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-php${{ matrix.php }}-${{ matrix.dependency-version }}-
            composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit --no-coverage
